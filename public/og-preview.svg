<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0204"/>
      <stop offset="0.48" stop-color="#160307"/>
      <stop offset="1" stop-color="#050001"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset="0.42" stop-color="#f5bd3d"/>
      <stop offset="0.7" stop-color="#b7660d"/>
      <stop offset="1" stop-color="#fff0a5"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4d42"/>
      <stop offset="0.48" stop-color="#df1018"/>
      <stop offset="1" stop-color="#770409"/>
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#6b3208" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#ffbf38" flood-opacity="0.45"/>
    </filter>
    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#ff1d20" flood-opacity="0.6"/>
    </filter>
    <pattern id="bulbs" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="19" cy="19" r="5.5" fill="#ffd475"/>
      <circle cx="19" cy="19" r="10" fill="#ffb326" opacity="0.12"/>
    </pattern>
    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="12" r="1" fill="#ffffff" opacity="0.05"/>
      <circle cx="48" cy="33" r="1" fill="#ffcf7a" opacity="0.04"/>
      <circle cx="70" cy="68" r="1" fill="#ffffff" opacity="0.035"/>
      <circle cx="31" cy="72" r="1" fill="#d8171f" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <rect x="0" y="0" width="1200" height="54" fill="#120204"/>
  <rect x="0" y="54" width="1200" height="30" fill="url(#bulbs)"/>
  <rect x="0" y="555" width="1200" height="58" fill="url(#red)" filter="url(#redGlow)"/>
  <text x="35" y="591" fill="#ffe7a0" font-size="23" font-family="Impact, Haettenschweiler, Arial Narrow, sans-serif" letter-spacing="6">
    THE BANKER IS CALLING ★ ROUND 024 LIVE ★ WHAT'S IN YOUR BOX? ★ CONVICTION COMPOUNDS ★
  </text>

  <path d="M120 132 L240 520" stroke="#6d2b18" stroke-width="3" opacity="0.55"/>
  <path d="M1080 132 L960 520" stroke="#6d2b18" stroke-width="3" opacity="0.55"/>
  <ellipse cx="600" cy="340" rx="310" ry="260" fill="#3d0308" opacity="0.16"/>
  <ellipse cx="600" cy="340" rx="210" ry="180" fill="#d71920" opacity="0.08"/>

  <g transform="translate(505 430)" filter="url(#redGlow)">
    <rect x="0" y="-15" width="190" height="122" rx="18" fill="url(#red)"/>
    <rect x="-18" y="-42" width="226" height="42" rx="12" fill="#ff3c37"/>
    <text x="95" y="66" text-anchor="middle" fill="#ffe6a1" font-size="72" font-family="Impact, Haettenschweiler, Arial Narrow, sans-serif">?</text>
  </g>

  <text x="600" y="170" text-anchor="middle" fill="#f7c05a" font-size="20" font-family="Impact, Haettenschweiler, Arial Narrow, sans-serif" letter-spacing="8">
    ON-CHAIN SOCIAL EXPERIMENT / MAINNET HOLDER GAME
  </text>
  <text x="600" y="292" text-anchor="middle" fill="#f7c458" stroke="#7a3707" stroke-width="3" font-size="132" font-family="Impact, Haettenschweiler, Arial Narrow, sans-serif" font-weight="900" letter-spacing="3">
    HODL OR
  </text>
  <text x="600" y="408" text-anchor="middle" fill="#f7c458" stroke="#7a3707" stroke-width="3" font-size="132" font-family="Impact, Haettenschweiler, Arial Narrow, sans-serif" font-weight="900" letter-spacing="3">
    NO HODL
  </text>
  <text x="600" y="514" text-anchor="middle" fill="#f5d4bf" font-size="31" font-family="Arial, sans-serif" font-weight="800">
    Every round asks the same question: hodl, or no hodl?
  </text>
  <text x="600" y="100" text-anchor="middle" fill="#fff1c2" font-size="31" font-family="Impact, Haettenschweiler, Arial Narrow, sans-serif" letter-spacing="4">
    HODL OR NO HODL<tspan fill="#f2bc45">.FUN</tspan>
  </text>
</svg>
